name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: ./app
          dockerfile: ./app/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cortex-app:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: ./app
          dockerfile: ./app/Dockerfile.worker
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cortex-worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build and push discord-bot
        uses: docker/build-push-action@v6
        with:
          context: ./discord-bot
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cortex-discord-bot:latest
          cache-from: type=gha,scope=discord-bot
          cache-to: type=gha,mode=max,scope=discord-bot

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/cortex
            git pull
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --no-build
            docker image prune -f
