<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex Capture</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">◆</span>
        <span class="logo-text">Cortex</span>
      </div>
    </header>

    <!-- Loading state -->
    <div id="state-loading" class="state">
      <div class="spinner"></div>
      <p>Loading…</p>
    </div>

    <!-- Misconfigured state -->
    <div id="state-config" class="state hidden">
      <div class="icon-large">⚙</div>
      <p class="message">Please configure your API settings first.</p>
      <button id="btn-open-options" class="btn btn-primary">Open Options</button>
    </div>

    <!-- Main capture form -->
    <div id="state-form" class="state hidden">
      <div class="page-info">
        <div class="page-title" id="page-title" title=""></div>
        <div class="page-url" id="page-url" title=""></div>
      </div>

      <div class="field">
        <label for="category-select">Category</label>
        <select id="category-select">
          <option value="">— None —</option>
        </select>
      </div>

      <div class="field">
        <label for="notes-input">Notes <span class="optional">(optional)</span></label>
        <textarea id="notes-input" rows="3" placeholder="Add a note…"></textarea>
      </div>

      <button id="btn-save" class="btn btn-primary">Save to Cortex</button>
    </div>

    <!-- Success state -->
    <div id="state-success" class="state hidden">
      <div class="icon-large success">✓</div>
      <p class="message success">Saved successfully!</p>
      <p class="sub-message" id="success-tags"></p>
      <button id="btn-save-another" class="btn btn-secondary">Back</button>
    </div>

    <!-- Already saved state -->
    <div id="state-duplicate" class="state hidden">
      <div class="icon-large info">◆</div>
      <p class="message info">Already in your Cortex library.</p>
      <button id="btn-dup-back" class="btn btn-secondary">Back</button>
    </div>

    <!-- Error state -->
    <div id="state-error" class="state hidden">
      <div class="icon-large error">✗</div>
      <p class="message error">Save failed.</p>
      <p class="sub-message" id="error-detail"></p>
      <button id="btn-retry" class="btn btn-secondary">Try Again</button>
    </div>
  </div>

  <footer class="footer">
    <a id="link-options" href="#">Settings</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
