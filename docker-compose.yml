services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: reader_organizer
      POSTGRES_USER: reader
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reader -d reader_organizer"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://reader:${DB_PASSWORD:-password}@db:5432/reader_organizer
      REDIS_URL: redis://redis:6379
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      JINA_API_KEY: ${JINA_API_KEY}
      API_KEY: ${API_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    # NOTE: discord-bot service (Task 3.1) will need DISCORD_TOKEN env var added here
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - knowledge_files:/app/knowledge
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  discord-bot:
    build: ./discord-bot
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - API_URL=http://app:3000
      - API_KEY=${API_KEY}
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  knowledge_files:
